name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend
        run: npm ci --prefix backend

      - name: Install frontend
        run: npm ci --prefix frontend

      - name: Check project
        run: npm run check

      - name: Audit backend high risk
        run: npm audit --omit=dev --audit-level=high --prefix backend

      - name: Audit frontend high risk
        run: npm audit --omit=dev --audit-level=high --prefix frontend

  mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install mobile dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze mobile
        working-directory: mobile
        run: flutter analyze

      - name: Test mobile
        working-directory: mobile
        run: flutter test

name: PostgreSQL Backup

on:
  workflow_dispatch:
  schedule:
    - cron: '20 7 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check backup configuration
        id: config
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          if [ -n "$DATABASE_PUBLIC_URL" ] && [ -n "$BACKUP_ENCRYPTION_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Backup configuration detected."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Backup skipped: missing DATABASE_PUBLIC_URL or BACKUP_ENCRYPTION_PASSWORD."
          fi

      - name: Install PostgreSQL client
        if: steps.config.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create encrypted backup
        if: steps.config.outputs.enabled == 'true'
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          pg_dump --format=custom --no-owner --no-acl "$DATABASE_PUBLIC_URL" --file inventapro.dump
          openssl enc -aes-256-cbc -salt -pbkdf2 -in inventapro.dump -out "inventapro-$(date -u +%Y%m%dT%H%M%SZ).dump.enc" -pass env:BACKUP_ENCRYPTION_PASSWORD
          rm inventapro.dump

      - name: Upload encrypted backup
        if: steps.config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: inventapro-postgresql-${{ github.run_id }}
          path: '*.dump.enc'
          retention-days: 14
          if-no-files-found: error
